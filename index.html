<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플랜에이(PlanA) 명함 시안</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        /* Smooth transition for flip */
        .card-inner {
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 3D perspective wrapper */
        .card-container {
            perspective: 1000px;
        }

        .flipped .card-inner {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">플랜에이(PlanA) 명함 시안</h1>
            <p class="text-gray-600">명함을 클릭하면 앞뒤를 확인할 수 있습니다.</p>
        </div>

        <!-- Card Container -->
        <div id="card" class="card-container relative w-[350px] h-[550px] md:w-[400px] md:h-[650px] cursor-pointer">
            <div class="card-inner relative w-full h-full preserve-3d">
                
                <!-- Front Side -->
                <div class="absolute w-full h-full backface-hidden rounded-3xl overflow-hidden shadow-2xl bg-[#1a1a1a] flex flex-col items-center justify-between py-24">
                    <!-- Top & Center Area -->
                    <div class="flex flex-col items-center">
                        <!-- Holographic Logo Placeholder -->
                        <div class="relative group">
                            <div class="text-[140px] font-bold leading-none bg-gradient-to-br from-purple-300 via-yellow-200 to-blue-300 bg-clip-text text-transparent opacity-90">
                                a
                            </div>
                            <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-12 h-1 bg-gradient-to-r from-purple-400 via-yellow-300 to-blue-400 rounded-full"></div>
                        </div>

                        <!-- Added text in the center area -->
                        <p class="text-gray-400 text-lg mt-10 tracking-[0.2em] font-light">오직 당신을 위한 인생 플래너</p>
                    </div>

                    <!-- Bottom Text -->
                    <div class="text-2xl tracking-tighter font-light bg-gradient-to-r from-purple-300 via-yellow-200 to-blue-300 bg-clip-text text-transparent">
                        <span class="font-bold">플랜에이</span>PlanA
                    </div>
                </div>

                <!-- Back Side -->
                <div class="absolute w-full h-full backface-hidden rounded-3xl overflow-hidden shadow-2xl bg-[#d4e12e] flex flex-col p-10 rotate-y-180">
                    <!-- Top Row: Name & QR -->
                    <div class="flex justify-between items-start mb-12">
                        <div>
                            <p class="text-sm font-medium text-gray-700">planner</p>
                            <h2 class="text-3xl font-bold text-black mt-1">김연진</h2>
                        </div>
                        <div class="bg-white p-2 rounded-lg shadow-sm">
                            <div class="w-16 h-16 bg-white flex items-center justify-center border border-gray-200 overflow-hidden">
                                <!-- Uploaded QR Code -->
                                <img src="KakaoTalk_20260327_100635709.jpg" alt="QR Code" class="w-full h-full object-cover" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=http://gavin21c.com'">
                            </div>
                        </div>
                    </div>

                    <!-- Bottom Info Section -->
                    <div class="mt-auto">
                        <div class="mb-6">
                            <div class="text-2xl tracking-tighter text-black leading-none">
                                <span class="font-bold">플랜에이</span>(PlanA)
                            </div>
                            <div class="text-sm text-gray-800 mt-1 font-medium">플랜에이(PlanA)</div>
                        </div>

                        <div class="space-y-2 text-[13px] text-gray-900 leading-tight">
                            <p>충청남도천안시서북구백석3로70</p>
                            <p class="mb-4">301동1002호(백석동,주공아파트)</p>
                            
                            
                            </div>

                            <div class="flex items-center gap-2">
                                <div class="w-5 h-5 rounded-full bg-black flex items-center justify-center">
                                    <i data-lucide="smartphone" class="w-[10px] h-[10px] text-[#d4e12e] fill-current"></i>
                                </div>
                                <span class="font-semibold">010.7519.9460</span>
                            </div>

                            <div class="flex items-center gap-2">
                                <div class="w-5 h-5 rounded-full bg-black flex items-center justify-center">
                                    <i data-lucide="mail" class="w-[10px] h-[10px] text-[#d4e12e] fill-current"></i>
                                </div>
                                <span class="font-semibold">yeon_jin_v@naver.com</span>
                            </div>

                            <div class="flex items-center gap-2">
                                <div class="w-5 h-5 rounded-full bg-black flex items-center justify-center">
                                    <i data-lucide="globe" class="w-[10px] h-[10px] text-[#d4e12e]"></i>
                                </div>
                                <span class="font-semibold">https://cafe.naver.com/saleson</span>
                            </div>

                            <div class="flex items-center gap-2">
                                <div class="w-5 h-5 rounded-full bg-black flex items-center justify-center">
                                    <i data-lucide="instagram" class="w-[10px] h-[10px] text-[#d4e12e]"></i>
                                </div>
                                <span class="font-semibold">www.instagram.com/yeon_jin_v</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Handle Flip Interaction
        const card = document.getElementById('card');
        card.addEventListener('click', () => {
            card.classList.toggle('flipped');
        });
    </script>
</body>
</html>
