<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명함 관리 매니저 - AI 스캔 & 업로드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-open { overflow: hidden; }
        .transition-all { transition: all 0.2s ease-in-out; }
        .scanning-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(to bottom, transparent, #6366f1, transparent);
            box-shadow: 0 0 15px #6366f1;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        .pulse-border {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { border-color: rgba(99, 102, 241, 0.3); }
            50% { border-color: rgba(99, 102, 241, 1); }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- 헤더 섹션 -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-indigo-700 flex items-center gap-2">
                    <i data-lucide="briefcase" class="w-8 h-8"></i>
                    명함 관리 매니저
                </h1>
                <p id="card-count" class="text-slate-500 mt-1">총 0개의 연락처가 저장되어 있습니다.</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <!-- 업로드 관련 -->
                <input type="file" id="csv-upload" class="hidden" accept=".csv" onchange="handleImportCSV(event)">
                <button onclick="document.getElementById('csv-upload').click()" class="flex items-center gap-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-lg transition-all shadow-sm">
                    <i data-lucide="upload" class="w-4 h-4 text-indigo-600"></i>
                    데이터 업로드
                </button>
                <button onclick="downloadCSV()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg transition-all shadow-sm">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    엑셀 저장
                </button>
                <button onclick="openCameraModal()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-all shadow-sm">
                    <i data-lucide="camera" class="w-4 h-4"></i>
                    AI 명함 스캔
                </button>
                <button onclick="openModal()" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg transition-all shadow-sm">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    수동 추가
                </button>
            </div>
        </header>

        <!-- 검색 바 -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex items-center gap-3">
            <i data-lucide="search" class="text-slate-400 w-5 h-5"></i>
            <input 
                type="text" 
                id="search-input"
                oninput="handleSearch()"
                placeholder="이름, 회사, 연락처 검색..." 
                class="flex-1 outline-none text-lg bg-transparent"
            />
            <button id="clear-search" onclick="clearSearch()" class="hidden text-slate-400 hover:text-slate-600">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- 명함 목록 테이블 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm font-semibold uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4">이름</th>
                            <th class="px-6 py-4">회사 / 직함</th>
                            <th class="px-6 py-4">연락처</th>
                            <th class="px-6 py-4">이메일</th>
                            <th class="px-6 py-4 text-right">관리</th>
                        </tr>
                    </thead>
                    <tbody id="card-table-body" class="divide-y divide-slate-100">
                        <!-- 데이터가 동적으로 렌더링됨 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 추가/수정 모달 -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 id="modal-title" class="text-xl font-bold flex items-center gap-2 text-slate-800"></h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="card-form" onsubmit="handleSubmit(event)" class="p-6 space-y-4">
                <input type="hidden" id="card-id">
                
                <div id="scan-preview-container" class="hidden mb-4 relative rounded-lg overflow-hidden border border-slate-200">
                    <img id="scan-preview" class="w-full h-32 object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-2">
                        <span class="text-white text-xs font-bold px-2 py-1 bg-indigo-600/80 rounded backdrop-blur-sm">AI 스캔 완료</span>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4 text-slate-400"></i> 이름
                    </label>
                    <input required id="form-name" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="홍길동">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                            <i data-lucide="building-2" class="w-4 h-4 text-slate-400"></i> 회사
                        </label>
                        <input id="form-company" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="회사명">
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                            <i data-lucide="briefcase" class="w-4 h-4 text-slate-400"></i> 직함
                        </label>
                        <input id="form-position" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="직위/직책">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                        <i data-lucide="phone" class="w-4 h-4 text-slate-400"></i> 전화번호
                    </label>
                    <input id="form-phone" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="010-0000-0000">
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                        <i data-lucide="mail" class="w-4 h-4 text-slate-400"></i> 이메일
                    </label>
                    <input type="email" id="form-email" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="example@mail.com">
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-700">메모</label>
                    <textarea id="form-memo" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none h-20 resize-none" placeholder="특이사항을 입력하세요..."></textarea>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-xl transition-all">
                        취소
                    </button>
                    <button type="submit" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-200">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        <span id="submit-btn-text">저장</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 카메라 스캔 모달 -->
    <div id="camera-overlay" class="hidden fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-[60] p-4">
        <div class="relative w-full max-w-lg aspect-[3/2] bg-slate-900 rounded-2xl border-2 border-indigo-500/50 overflow-hidden shadow-2xl pulse-border">
            <video id="video-feed" autoplay playsinline class="w-full h-full object-cover"></video>
            
            <!-- 스캔 애니메이션 라인 -->
            <div id="scanning-line" class="scanning-line hidden"></div>
            
            <!-- 가이드라인 영역 -->
            <div class="absolute inset-8 border-2 border-dashed border-white/40 rounded-lg pointer-events-none flex items-center justify-center">
                <div class="text-white/30 text-xs font-bold uppercase tracking-widest">Business Card Area</div>
            </div>

            <!-- 분석 중 오버레이 -->
            <div id="camera-loading" class="hidden absolute inset-0 bg-black/70 flex flex-col items-center justify-center text-white gap-4 backdrop-blur-sm">
                <div class="relative">
                    <div class="w-16 h-16 border-4 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <i data-lucide="brain-circuit" class="w-6 h-6 text-indigo-400"></i>
                    </div>
                </div>
                <div class="text-center">
                    <p class="text-lg font-bold">AI 분석 중</p>
                    <p class="text-slate-400 text-sm">이미지에서 정보를 추출하고 있습니다...</p>
                </div>
            </div>
        </div>
        
        <div class="mt-8 flex items-center gap-10">
            <button onclick="closeCameraModal()" class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition-all group">
                <i data-lucide="arrow-left" class="w-6 h-6 group-hover:-translate-x-1 transition-transform"></i>
            </button>
            <button id="capture-btn" onclick="captureAndAnalyze()" class="relative group">
                <div class="absolute -inset-4 bg-indigo-500/20 rounded-full blur-xl group-hover:bg-indigo-500/30 transition-all"></div>
                <div class="w-20 h-20 rounded-full bg-white border-8 border-slate-800 hover:scale-105 active:scale-95 transition-all flex items-center justify-center">
                    <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center">
                        <i data-lucide="camera" class="text-white w-6 h-6"></i>
                    </div>
                </div>
            </button>
            <div class="w-14"></div>
        </div>
        
        <div class="mt-6 flex flex-col items-center gap-2">
            <p class="text-white font-medium">명함을 가이드에 맞춰 정면으로 찍어주세요.</p>
            <p class="text-white/40 text-xs text-center px-10">글자가 선명하게 보일수록 분석 정확도가 올라갑니다.</p>
        </div>
    </div>

    <canvas id="capture-canvas" class="hidden"></canvas>

    <script>
        const apiKey = ""; // API Key는 환경에서 자동 제공됨
        let cards = [];
        let searchTerm = '';
        let stream = null;

        window.onload = () => {
            const savedCards = localStorage.getItem('my-business-cards');
            if (savedCards) {
                cards = JSON.parse(savedCards);
            } else {
                cards = [
                    { id: 1, name: '홍길동', company: '에이아이 테크', position: '기술 팀장', phone: '010-1234-5678', email: 'hong@aitech.com', memo: '주요 거래처 담당자' }
                ];
                saveToLocal();
            }
            render();
            lucide.createIcons();
        };

        function saveToLocal() {
            localStorage.setItem('my-business-cards', JSON.stringify(cards));
        }

        // CSV 파일 가져오기 (업로드) 로직
        function handleImportCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = parseCSV(text);
                
                // 첫 줄(헤더) 제외하고 데이터 가공
                if (rows.length < 2) return;
                
                const newCards = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 5) continue; // 데이터가 부족한 행 스킵
                    
                    newCards.push({
                        id: Date.now() + i, // 고유 ID 생성
                        name: row[0].replace(/^"|"$/g, ''),
                        company: row[1].replace(/^"|"$/g, ''),
                        position: row[2].replace(/^"|"$/g, ''),
                        phone: row[3].replace(/^"|"$/g, ''),
                        email: row[4].replace(/^"|"$/g, ''),
                        memo: row[5] ? row[5].replace(/^"|"$/g, '') : ""
                    });
                }

                if (newCards.length > 0) {
                    cards = [...cards, ...newCards];
                    saveToLocal();
                    render();
                    alert(`${newCards.length}개의 연락처를 성공적으로 불러왔습니다.`);
                }
                event.target.value = ''; // input 초기화
            };
            reader.readAsText(file, "UTF-8");
        }

        // CSV 파싱 유틸리티 (쉼표 처리 및 따옴표 처리)
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.filter(line => line.trim() !== "").map(line => {
                const result = [];
                let cell = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"' && line[i + 1] === '"') {
                        cell += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(cell);
                        cell = '';
                    } else {
                        cell += char;
                    }
                }
                result.push(cell);
                return result;
            });
        }

        async function openCameraModal() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                document.getElementById('video-feed').srcObject = stream;
                document.getElementById('camera-overlay').classList.remove('hidden');
                document.body.classList.add('modal-open');
                lucide.createIcons();
            } catch (err) {
                const msg = document.createElement('div');
                msg.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-xl z-[100]";
                msg.innerText = "카메라 접근 권한이 필요합니다.";
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 3000);
            }
        }

        function closeCameraModal() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            document.getElementById('camera-overlay').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        async function callGeminiVision(base64Image) {
            const prompt = "Extract all contact information from this business card image. Return ONLY a JSON object with these keys: name, company, position, phone, email, memo. If a piece of information is missing, use an empty string. The memo field should summarize any extra details like address or website.";
            
            const payload = {
                contents: [{
                    role: "user",
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: "image/png", data: base64Image } }
                    ]
                }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            name: { type: "STRING" },
                            company: { type: "STRING" },
                            position: { type: "STRING" },
                            phone: { type: "STRING" },
                            email: { type: "STRING" },
                            memo: { type: "STRING" }
                        }
                    }
                }
            };

            let retryCount = 0;
            const maxRetries = 5;

            while (retryCount <= maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('API request failed');

                    const result = await response.json();
                    const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    return JSON.parse(textResponse);
                } catch (error) {
                    if (retryCount === maxRetries) throw error;
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    retryCount++;
                }
            }
        }

        async function captureAndAnalyze() {
            const video = document.getElementById('video-feed');
            const canvas = document.getElementById('capture-canvas');
            const context = canvas.getContext('2d');
            const loading = document.getElementById('camera-loading');
            const scanLine = document.getElementById('scanning-line');
            const captureBtn = document.getElementById('capture-btn');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Image = canvas.toDataURL('image/png').split(',')[1];

            scanLine.classList.remove('hidden');
            loading.classList.remove('hidden');
            captureBtn.disabled = true;

            try {
                const data = await callGeminiVision(base64Image);
                closeCameraModal();
                openModal();
                
                document.getElementById('form-name').value = data.name || "";
                document.getElementById('form-company').value = data.company || "";
                document.getElementById('form-position').value = data.position || "";
                document.getElementById('form-phone').value = data.phone || "";
                document.getElementById('form-email').value = data.email || "";
                document.getElementById('form-memo').value = data.memo || "";

                const previewContainer = document.getElementById('scan-preview-container');
                const previewImg = document.getElementById('scan-preview');
                previewContainer.classList.remove('hidden');
                previewImg.src = `data:image/png;base64,${base64Image}`;

            } catch (err) {
                console.error(err);
                alert("AI 분석 중 오류가 발생했습니다. 수동으로 입력해주시거나 다시 시도해주세요.");
            } finally {
                loading.classList.add('hidden');
                scanLine.classList.add('hidden');
                captureBtn.disabled = false;
            }
        }

        function handleSearch() {
            searchTerm = document.getElementById('search-input').value.toLowerCase();
            document.getElementById('clear-search').classList.toggle('hidden', !searchTerm);
            render();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            searchTerm = '';
            document.getElementById('clear-search').classList.add('hidden');
            render();
        }

        function openModal(cardId = null) {
            const overlay = document.getElementById('modal-overlay');
            const titleEl = document.getElementById('modal-title');
            const submitBtnText = document.getElementById('submit-btn-text');
            const form = document.getElementById('card-form');
            const previewContainer = document.getElementById('scan-preview-container');
            
            overlay.classList.remove('hidden');
            document.body.classList.add('modal-open');

            if (cardId) {
                const card = cards.find(c => c.id == cardId);
                titleEl.innerHTML = `<i data-lucide="edit-2" class="w-5 h-5"></i> 명함 정보 수정`;
                submitBtnText.innerText = '정보 수정';
                previewContainer.classList.add('hidden');
                
                document.getElementById('card-id').value = card.id;
                document.getElementById('form-name').value = card.name;
                document.getElementById('form-company').value = card.company;
                document.getElementById('form-position').value = card.position;
                document.getElementById('form-phone').value = card.phone;
                document.getElementById('form-email').value = card.email;
                document.getElementById('form-memo').value = card.memo;
            } else {
                titleEl.innerHTML = `<i data-lucide="plus" class="w-5 h-5"></i> 새 연락처 등록`;
                submitBtnText.innerText = '연락처 저장';
                if (document.getElementById('form-name').value === "" && previewContainer.classList.contains('hidden')) {
                    form.reset();
                    document.getElementById('card-id').value = '';
                }
            }
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.body.classList.remove('modal-open');
            document.getElementById('card-form').reset();
            document.getElementById('scan-preview-container').classList.add('hidden');
        }

        function handleSubmit(event) {
            event.preventDefault();
            const cardId = document.getElementById('card-id').value;
            const cardData = {
                name: document.getElementById('form-name').value,
                company: document.getElementById('form-company').value,
                position: document.getElementById('form-position').value,
                phone: document.getElementById('form-phone').value,
                email: document.getElementById('form-email').value,
                memo: document.getElementById('form-memo').value
            };

            if (cardId) {
                cards = cards.map(c => c.id == cardId ? { ...cardData, id: Number(cardId) } : c);
            } else {
                cards.push({ ...cardData, id: Date.now() });
            }

            saveToLocal();
            closeModal();
            render();
        }

        function deleteCard(id) {
            if (confirm('이 연락처를 삭제하시겠습니까?')) {
                cards = cards.filter(c => c.id !== id);
                saveToLocal();
                render();
            }
        }

        function downloadCSV() {
            if (cards.length === 0) return;
            const headers = ['이름', '회사', '직함', '전화번호', '이메일', '메모'];
            const csvRows = [
                '\uFEFF' + headers.join(','),
                ...cards.map(c => [
                    `"${c.name}"`, `"${c.company}"`, `"${c.position}"`, `"${c.phone}"`, `"${c.email}"`, `"${c.memo.replace(/\n/g, ' ')}"`
                ].join(','))
            ];
            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `Business_Contacts_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function render() {
            const tbody = document.getElementById('card-table-body');
            const countEl = document.getElementById('card-count');
            const filtered = cards.filter(card => 
                card.name.toLowerCase().includes(searchTerm) ||
                card.company.toLowerCase().includes(searchTerm) ||
                card.phone.includes(searchTerm) ||
                card.email.toLowerCase().includes(searchTerm)
            );
            countEl.innerText = `총 ${cards.length}개의 연락처가 저장되어 있습니다.`;

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-20 text-center text-slate-400 font-medium">${searchTerm ? '검색 결과가 없습니다.' : '저장된 명함이 없습니다.'}</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(card => `
                <tr class="hover:bg-slate-50 transition-all group">
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800">${card.name}</div>
                        ${card.memo ? `<div class="text-xs text-slate-400 truncate max-w-[150px] mt-0.5">${card.memo}</div>` : ''}
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-slate-700 font-medium">${card.company || '-'}</div>
                        <div class="text-xs text-slate-500 uppercase tracking-tighter">${card.position || '-'}</div>
                    </td>
                    <td class="px-6 py-4 text-indigo-600 font-mono text-sm font-medium">${card.phone || '-'}</td>
                    <td class="px-6 py-4 text-slate-500 text-sm">${card.email || '-'}</td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-all">
                            <button onclick="openModal(${card.id})" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-full transition-all">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteCard(${card.id})" class="p-2 text-rose-500 hover:bg-rose-50 rounded-full transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }
    </script>
</body>
</html>
