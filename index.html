<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명함 관리 매니저</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-open { overflow: hidden; }
        .transition-all { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- 헤더 섹션 -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-bold text-indigo-700 flex items-center gap-2">
                    <i data-lucide="briefcase" class="w-8 h-8"></i>
                    명함 관리 매니저
                </h1>
                <p id="card-count" class="text-slate-500 mt-1">총 0개의 연락처가 저장되어 있습니다.</p>
            </div>
            
            <div class="flex gap-2">
                <button onclick="downloadCSV()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg transition-all shadow-sm">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    엑셀로 저장
                </button>
                <button onclick="openModal()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-all shadow-sm">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    새 명함 추가
                </button>
            </div>
        </header>

        <!-- 검색 바 -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex items-center gap-3">
            <i data-lucide="search" class="text-slate-400 w-5 h-5"></i>
            <input 
                type="text" 
                id="search-input"
                oninput="handleSearch()"
                placeholder="이름, 회사, 연락처 검색..." 
                class="flex-1 outline-none text-lg bg-transparent"
            />
            <button id="clear-search" onclick="clearSearch()" class="hidden text-slate-400 hover:text-slate-600">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- 명함 목록 테이블 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm font-semibold uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4">이름</th>
                            <th class="px-6 py-4">회사 / 직함</th>
                            <th class="px-6 py-4">연락처</th>
                            <th class="px-6 py-4">이메일</th>
                            <th class="px-6 py-4 text-right">관리</th>
                        </tr>
                    </thead>
                    <tbody id="card-table-body" class="divide-y divide-slate-100">
                        <!-- 데이터가 여기에 동적으로 렌더링됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 추가/수정 모달 -->
    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 id="modal-title" class="text-xl font-bold flex items-center gap-2 text-slate-800">
                    <!-- 아이콘과 타이틀이 여기에 들어갑니다 -->
                </h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="card-form" onsubmit="handleSubmit(event)" class="p-6 space-y-4">
                <input type="hidden" id="card-id">
                
                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4 text-slate-400"></i> 이름
                    </label>
                    <input required id="form-name" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="홍길동">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                            <i data-lucide="building-2" class="w-4 h-4 text-slate-400"></i> 회사
                        </label>
                        <input id="form-company" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="회사명">
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                            <i data-lucide="briefcase" class="w-4 h-4 text-slate-400"></i> 직함
                        </label>
                        <input id="form-position" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="직위/직책">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                        <i data-lucide="phone" class="w-4 h-4 text-slate-400"></i> 전화번호
                    </label>
                    <input id="form-phone" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="010-0000-0000">
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">
                        <i data-lucide="mail" class="w-4 h-4 text-slate-400"></i> 이메일
                    </label>
                    <input type="email" id="form-email" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="example@mail.com">
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-medium text-slate-700">메모</label>
                    <textarea id="form-memo" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none h-24 resize-none" placeholder="특이사항을 입력하세요..."></textarea>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-xl transition-all">
                        취소
                    </button>
                    <button type="submit" class="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-200">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        <span id="submit-btn-text">명함 저장</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 상태 변수
        let cards = [];
        let searchTerm = '';

        // 초기화
        window.onload = () => {
            const savedCards = localStorage.getItem('my-business-cards');
            if (savedCards) {
                cards = JSON.parse(savedCards);
            } else {
                // 샘플 데이터
                cards = [
                    { id: 1, name: '홍길동', company: '에이아이 테크', position: '팀장', phone: '010-1234-5678', email: 'hong@aitech.com', memo: '주요 거래처 담당자' },
                    { id: 2, name: '김철수', company: '디자인 연구소', position: '수석 디자이너', phone: '010-9876-5432', email: 'kim@design.co.kr', memo: '웹 디자인 협업 가능' }
                ];
                saveToLocal();
            }
            render();
            lucide.createIcons();
        };

        // 데이터 저장
        function saveToLocal() {
            localStorage.setItem('my-business-cards', JSON.stringify(cards));
        }

        // 검색 처리
        function handleSearch() {
            searchTerm = document.getElementById('search-input').value.toLowerCase();
            document.getElementById('clear-search').classList.toggle('hidden', !searchTerm);
            render();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            searchTerm = '';
            document.getElementById('clear-search').classList.add('hidden');
            render();
        }

        // 모달 제어
        function openModal(cardId = null) {
            const overlay = document.getElementById('modal-overlay');
            const titleEl = document.getElementById('modal-title');
            const submitBtnText = document.getElementById('submit-btn-text');
            const form = document.getElementById('card-form');
            
            overlay.classList.remove('hidden');
            document.body.classList.add('modal-open');

            if (cardId) {
                const card = cards.find(c => c.id == cardId);
                titleEl.innerHTML = `<i data-lucide="edit-2" class="w-5 h-5"></i> 명함 수정`;
                submitBtnText.innerText = '수정 완료';
                
                document.getElementById('card-id').value = card.id;
                document.getElementById('form-name').value = card.name;
                document.getElementById('form-company').value = card.company;
                document.getElementById('form-position').value = card.position;
                document.getElementById('form-phone').value = card.phone;
                document.getElementById('form-email').value = card.email;
                document.getElementById('form-memo').value = card.memo;
            } else {
                titleEl.innerHTML = `<i data-lucide="plus" class="w-5 h-5"></i> 새 명함 추가`;
                submitBtnText.innerText = '명함 저장';
                form.reset();
                document.getElementById('card-id').value = '';
            }
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        // 제출 처리
        function handleSubmit(event) {
            event.preventDefault();
            
            const cardId = document.getElementById('card-id').value;
            const cardData = {
                name: document.getElementById('form-name').value,
                company: document.getElementById('form-company').value,
                position: document.getElementById('form-position').value,
                phone: document.getElementById('form-phone').value,
                email: document.getElementById('form-email').value,
                memo: document.getElementById('form-memo').value
            };

            if (cardId) {
                cards = cards.map(c => c.id == cardId ? { ...cardData, id: Number(cardId) } : c);
            } else {
                cards.push({ ...cardData, id: Date.now() });
            }

            saveToLocal();
            closeModal();
            render();
        }

        // 삭제 처리
        function deleteCard(id) {
            if (confirm('정말로 이 명함을 삭제하시겠습니까?')) {
                cards = cards.filter(c => c.id !== id);
                saveToLocal();
                render();
            }
        }

        // 엑셀(CSV) 다운로드
        function downloadCSV() {
            if (cards.length === 0) return;
            
            const headers = ['이름', '회사', '직함', '전화번호', '이메일', '메모'];
            const csvRows = [
                '\uFEFF' + headers.join(','), // BOM for Korean Excel encoding
                ...cards.map(c => [
                    `"${c.name}"`, 
                    `"${c.company}"`, 
                    `"${c.position}"`, 
                    `"${c.phone}"`, 
                    `"${c.email}"`, 
                    `"${c.memo.replace(/\n/g, ' ')}"`
                ].join(','))
            ];

            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `명함관리_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 화면 렌더링
        function render() {
            const tbody = document.getElementById('card-table-body');
            const countEl = document.getElementById('card-count');
            
            const filtered = cards.filter(card => 
                card.name.toLowerCase().includes(searchTerm) ||
                card.company.toLowerCase().includes(searchTerm) ||
                card.phone.includes(searchTerm) ||
                card.email.toLowerCase().includes(searchTerm)
            );

            countEl.innerText = `총 ${cards.length}개의 연락처가 저장되어 있습니다.`;

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-20 text-center text-slate-400">
                            ${searchTerm ? '검색 결과가 없습니다.' : '저장된 명함이 없습니다.'}
                        </td>
                    </tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(card => `
                <tr class="hover:bg-slate-50 transition-all group">
                    <td class="px-6 py-4">
                        <div class="font-bold text-slate-800">${card.name}</div>
                        ${card.memo ? `<div class="text-xs text-slate-400 truncate max-w-[150px]">${card.memo}</div>` : ''}
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-slate-700 font-medium">${card.company || '-'}</div>
                        <div class="text-sm text-slate-500">${card.position || '-'}</div>
                    </td>
                    <td class="px-6 py-4 text-slate-600 font-mono text-sm">${card.phone || '-'}</td>
                    <td class="px-6 py-4 text-slate-600 text-sm">${card.email || '-'}</td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-all">
                            <button onclick="openModal(${card.id})" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-full transition-all" title="수정">
                                <i data-lucide="edit-2" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteCard(${card.id})" class="p-2 text-rose-600 hover:bg-rose-50 rounded-full transition-all" title="삭제">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            lucide.createIcons(); // 아이콘 재생성
        }
    </script>
</body>
</html>
